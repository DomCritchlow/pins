name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          PINS_CLIENT_ID: ${{ secrets.PINS_CLIENT_ID }}
          PINS_API_KEY: ${{ secrets.PINS_API_KEY }}
          PINS_SHEET_NAME_PREFIX: ${{ secrets.PINS_SHEET_NAME_PREFIX }}
          PINS_ADMIN_CONTACT: ${{ secrets.PINS_ADMIN_CONTACT }}
        run: python3 scripts/build-config.py --env

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
